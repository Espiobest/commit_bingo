<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Bingo Grid lines (subtle) -->
  <path d="M160 64 v384 M352 64 v384 M64 160 h384 M64 352 h384" stroke="#1e293b" stroke-width="12" stroke-linecap="round" />
  
  <!-- Git Commit Branch line -->
  <path d="M100 412 L256 256 L412 256" fill="none" stroke="url(#grid-grad)" stroke-width="32" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Grid intersections/nodes (Bingo board buttons) -->
  <circle cx="100" cy="412" r="28" fill="#1e293b" stroke="#334155" stroke-width="6" />
  <circle cx="256" cy="256" r="44" fill="url(#node-grad)" filter="url(#glow)" />
  <circle cx="256" cy="256" r="20" fill="#ffffff" />
  
  <circle cx="412" cy="256" r="28" fill="#1e293b" stroke="#334155" stroke-width="6" />
  
  <!-- An extra commit node representing a bingo win -->
  <circle cx="256" cy="100" r="28" fill="#ec4899" stroke="#f472b6" stroke-width="6" />
  <path d="M256 256 V100" fill="none" stroke="url(#grid-grad)" stroke-dasharray="10, 10" stroke-width="16" />
</svg>